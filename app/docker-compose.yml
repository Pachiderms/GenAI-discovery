services:
  backend:
    container_name: backend
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/db:/app/db
      - ./backend/chroma_db:/app/chroma_db
      - ollama_models:/app/ollama_models
    environment:
      - OLLAMA_HOST=http://localhost:11434
    restart: on-failure

  frontend:
    image: nginx:alpine
    container_name: frontend
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    restart: on-failure

volumes:
  ollama_models: