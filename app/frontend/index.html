<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Voice Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>RAG Assistant <span class="status-dot"></span></h1>
        </header>

        <div id="chat-box" class="chat-box">
            <!-- Les messages s'afficheront ici -->
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="user-input" placeholder="Posez votre question...">
                <button id="send-btn">Envoyer</button>
            </div>
            <div class="voice-group">
                <button id="mic-btn" class="mic-off">
                    <span class="icon">🎤</span>
                </button>
                <p id="status-text">Cliquez pour parler</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
