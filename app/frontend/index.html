<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Voice Assistant</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="justify-items-center">
        <h1>RAG Assistant <span class="status-dot"></span></h1>
      </header>

      <div id="chat-box" class="chat-box">
        <!-- messgaes -->
      </div>

      <div class="controls justify-around">
        <div>
          <button id="mic-btn" class="mic-off">
            <span class="icon">🎙️</span>
          </button>
        </div>
        <div class="input-group">
          <textarea id="user-input" class="text-area field-sizing-fixed" placeholder="Posez Votre Question"></textarea>
          <button id="send-btn"><span class="icon">📤</span></button>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
